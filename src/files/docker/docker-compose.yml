

services:
  postgres:
    image: postgres:16
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bookstore_db
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "1989:5432"
    networks:
      - webapi_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name:  pgadmin_container
    environment:
     PGADMIN_DEFAULT_EMAIL: melika.83.shz@gmail.com
     PGADMIN_DEFAULT_PASSWORD: 123456
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "8090:80"
    networks:
      - webapi_network
    restart: unless-stopped
    depends_on:
        - postgres
       

  redis:
       image: redis:latest
       container_name: redis_container
       command: ["redis-server","/etc/redis/redis.conf"] #loading config
       volumes: #make a tunnel with drive for holdin snapshots
        - ./redis/redis.conf:/etc/redis/redis.conf
        - redis:/etc/redis/conf #redis configs
        - redis:/data #persist data
       ports:
        - "6379:6379"
       networks:
        - webapi_network
        






 




volumes:
  postgres:
  pgadmin:
  redis:

networks:
  webapi_network:
    driver: bridge
